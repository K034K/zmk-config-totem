# Dongle connects to 2 peripherals (left + right halves)
CONFIG_ZMK_SPLIT_BLE_CENTRAL_PERIPHERALS=2

# BT connections: 2 peripherals + 5 BT output profiles = 7
CONFIG_BT_MAX_CONN=7
CONFIG_BT_MAX_PAIRED=7

# Dongle has no physical keys, cannot wake from sleep
CONFIG_ZMK_SLEEP=n

# Max BLE transmit power for reliable connection to halves
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# USB polling at 1000Hz (1ms) for minimum USB latency
CONFIG_USB_HID_POLL_INTERVAL_MS=1

# Fastest BLE connection interval (7.5ms = ~133Hz, BLE protocol minimum)
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# Battery charging status LED (XIAO charges LiPo via USB automatically)
CONFIG_CHARGE_INDICATOR=y

# LED indicator for peripheral connection status
CONFIG_DONGLE_INDICATOR=y
